<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nicolás Castilla | Data Engineer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

<style>
:root {
    --accent-color: #FFB800;
    --accent-hover: #E5A500;
    --bg-light: #FDFDFD;
    --text-main: #1A1A1B;
    --sidebar-bg: #1A1A1B;
    --card-bg: #ffffff;
    --transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

body.dark-mode {
    --bg-light: #0D0D0E;
    --text-main: #FFFFFF;
    --card-bg: #1A1A1B;
    --sidebar-bg: #000000;
}

body {
    font-family: 'Space Grotesk', sans-serif;
    background-color: var(--bg-light);
    color: var(--text-main);
    transition: var(--transition);
}

.sidebar {
    background: var(--sidebar-bg);
    color: #fff;
    height: 100vh;
    position: sticky;
    top: 0;
    padding: 2rem;
    border-right: 4px solid var(--accent-color);
}

.img-profile {
    width: 130px;
    height: 130px;
    border-radius: 30px;
    border: 3px solid var(--accent-color);
    margin-bottom: 1rem;
}

.card-custom {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 2rem;
    transition: var(--transition);
}

.card-custom:hover {
    transform: scale(1.02);
    box-shadow: 0 10px 30px rgba(255,184,0,0.2);
}

.text-accent { color: var(--accent-color); }

.btn-accent {
    background: var(--accent-color);
    font-weight: bold;
    border-radius: 12px;
}
</style>
</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->
<aside class="col-md-3 col-lg-2 sidebar">

<div>
<img src="https://ca.slack-edge.com/E02KLGDBF9B-U08QE9338AH-b8884894c03e-512" class="img-profile">

<h4>
<span data-es="Nicolás" data-en="Nicolás">Nicolás</span>
<span class="text-accent" data-es="Castilla" data-en="Castilla">Castilla</span>
</h4>

<p data-es="Ingeniero de Datos Jr" data-en="Junior Data Engineer">
Ingeniero de Datos Jr
</p>

<button class="btn btn-accent w-100 mb-2" onclick="toggleTheme()" id="themeBtn">
🌙 Modo Oscuro
</button>

<button class="btn btn-outline-light w-100 mb-3" onclick="toggleLanguage()" id="langBtn">
🌐 EN
</button>

</div>

</aside>

<!-- MAIN -->
<main class="col-md-9 col-lg-10 p-5">

<h1 class="display-3">
<span data-es="INGENIERO DE DATOS" data-en="DATA ENGINEER">
INGENIERO DE DATOS
</span>
</h1>

<p class="mt-4"
data-es="Ingeniero en crecimiento enfocado en datos masivos y pipelines eficientes."
data-en="Growing engineer focused on large-scale data pipelines and efficiency.">
Ingeniero en crecimiento...
</p>

<h3 class="mt-5"
data-es="PROYECTOS"
data-en="PROJECTS">
PROYECTOS
</h3>

<div class="row">

<div class="col-md-4">
<div class="card-custom">
<h5>StepFit</h5>
<p data-es="App de seguimiento físico"
data-en="Fitness tracking app">
App de seguimiento físico
</p>
</div>
</div>

<div class="col-md-4">
<div class="card-custom">
<h5>Pandas Finance</h5>
<p data-es="Pipeline financiero"
data-en="Financial data pipeline">
Pipeline financiero
</p>
</div>
</div>

<div class="col-md-4">
<div class="card-custom">
<h5>Dashboard</h5>
<p data-es="Visualización de datos"
data-en="Data visualization dashboard">
Visualización de datos
</p>
</div>
</div>

</div>

</main>
</div>
</div>

<script>
let currentLang = 'es';

function toggleLanguage() {
    currentLang = currentLang === 'es' ? 'en' : 'es';

    document.querySelectorAll('[data-es]').forEach(el => {
        el.textContent = el.getAttribute('data-' + currentLang);
    });

    document.getElementById('langBtn').innerText =
        currentLang === 'es' ? '🌐 EN' : '🌐 ES';
}

function toggleTheme() {
    document.body.classList.toggle('dark-mode');
}
</script>

</body>
</html>
